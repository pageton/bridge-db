# SQLite to PostgreSQL Migration

# Promote a local SQLite database to PostgreSQL for production use.
# Useful for promoting a dev/embedded database to a production server.

source:
  provider: sqlite
  url: "sqlite:///data/myapp.db"

  # Or use individual override:
  # sqlite:
  #   path: "/data/myapp.db"

destination:
  provider: postgres
  url: "postgres://USER:PASSWORD@localhost:5432/myapp?sslmode=require"

pipeline:
  batch_size: 500
  dry_run: false
  verify: true
  conflict_strategy: overwrite
  migrate_schema: true
  fk_handling: ordered
  max_retries: 3
  retry_backoff: 500ms

checkpoint:
  enabled: true
  path: ".bridge-checkpoint-sqlite-pg.json"

logging:
  level: info
  json: false
