# SQLite to MySQL Migration
# -------------------------
# Migrate a local SQLite database to MySQL.
# Useful for promoting a dev/embedded database to a production server.

source:
  provider: sqlite
  url: "sqlite:///data/myapp.db"

  # Or use individual override:
  # sqlite:
  #   path: "/data/myapp.db"

destination:
  provider: mysql
  url: "mysql://USER:PASSWORD@tcp(localhost:3306)/myapp"

pipeline:
  batch_size: 500
  dry_run: false
  verify: true
  conflict_strategy: overwrite
  migrate_schema: true
  fk_handling: ordered
  max_retries: 3
  retry_backoff: 500ms

checkpoint:
  enabled: true
  path: ".bridge-checkpoint-sqlite-mysql.json"

logging:
  level: info
  json: false
