# Multi-Hop Migration Example

# This file demonstrates a multi-step migration pipeline.
# Run each step sequentially using separate config files or commands.
#
# Available config templates:
#   cockroachdb-to-mariadb.yaml   — CockroachDB to MariaDB
#   mongodb-to-postgres.yaml      — MongoDB to PostgreSQL
#   mssql-to-postgres.yaml        — MSSQL to PostgreSQL
#   mysql-to-mariadb.yaml         — MySQL to MariaDB
#   mysql-to-postgres.yaml        — MySQL to PostgreSQL
#   postgres-to-cockroachdb.yaml  — PostgreSQL to CockroachDB
#   postgres-to-mysql.yaml        — PostgreSQL to MySQL
#   postgres-to-postgres.yaml     — PostgreSQL to PostgreSQL (clone)
#   redis-to-redis.yaml           — Redis to Redis (clone)
#   sqlite-to-mysql.yaml          — SQLite to MySQL
#   sqlite-to-postgres.yaml       — SQLite to PostgreSQL
#
# Usage:
#   bridge migrate -c configs/mssql-to-postgres.yaml
#   bridge migrate -c configs/cockroachdb-to-mariadb.yaml
#   bridge migrate -c configs/sqlite-to-mysql.yaml
#
# Or use a shell script to chain them:
#
#   #!/bin/sh
#   set -e
#   echo "Step 1: MSSQL -> PostgreSQL"
#   bridge migrate -c configs/mssql-to-postgres.yaml
#   echo "Step 2: CockroachDB -> MariaDB"
#   bridge migrate -c configs/cockroachdb-to-mariadb.yaml
#   echo "Step 3: SQLite -> MySQL"
#   bridge migrate -c configs/sqlite-to-mysql.yaml
#   echo "All migrations complete."
#
# With nix:
#   nix run github:pageton/bridge-db -- migrate -c configs/mssql-to-postgres.yaml && \
#   nix run github:pageton/bridge-db -- migrate -c configs/cockroachdb-to-mariadb.yaml && \
#   nix run github:pageton/bridge-db -- migrate -c configs/sqlite-to-mysql.yaml
